<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>

    <form (submit)="login(); $event.preventDefault()">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="credentials.email"
        name="email"
        required
      />
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="credentials.password"
        name="password"
        required
      />

      <button type="submit">Login</button>
    </form>

    <p class="msg" *ngIf="errorMessage">{{ errorMessage }}</p>

    <p>Don't have an account? <a routerLink="/signup" class="link-button">Sign up here</a></p>
  </div>
</div>
